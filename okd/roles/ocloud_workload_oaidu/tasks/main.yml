---
- name: Create staging dir
  ansible.builtin.tempfile:
    path: "{{ lookup('env', 'HOME') }}"
    prefix: "ocloud_workload_oaidu.{{ ansible_date_time['date'] }}."
    state: directory
  register: ocloud_workload_oaidu_staging_dir

- name: Download Helm
  ansible.builtin.get_url:
    url: "{{ ocloud_workload_oaidu_helm_url }}"
    dest: "{{ ocloud_workload_oaidu_staging_dir['path'] }}/helm-linux-amd64.tar.gz"

- name: Create helm directory
  ansible.builtin.file:
    path: "{{ ocloud_workload_oaidu_staging_dir['path'] }}/helm"
    state: directory

- name: Extract Helm
  ansible.builtin.unarchive:
    src: "{{ ocloud_workload_oaidu_staging_dir['path'] }}/helm-linux-amd64.tar.gz"
    dest: "{{ ocloud_workload_oaidu_staging_dir['path'] }}/helm"
    remote_src: true

- name: Clone charts repo
  ansible.builtin.git:
    repo: "{{ ocloud_workload_oaidu_repo_url }}"
    version: "{{ ocloud_workload_oaidu_repo_version }}"
    dest: "{{ ocloud_workload_oaidu_staging_dir['path'] }}/git/charts"
    recursive: false

- name: Deploy oai-cu-cp Helm chart
  kubernetes.core.helm:
    name: oai-cu-cp
    chart_ref: "{{ ocloud_workload_oaidu_staging_dir['path'] }}/git/charts/oai-5g-ran/oai-du-fhi-72"
    release_namespace: "{{ ocloud_workload_oaidu_namespace }}"
    create_namespace: true
    values:
      kubernetesDistribution: "Openshift"
      nfimage:
        repository: {{ ocloud_workload_oaidu_image_url }}
        version: {{ ocloud_workload_oaidu_image_tag }}
    kubeconfig: "{{ ocloud_dms_kubeconfig }}"
    binary_path: "{{ ocloud_workload_oaidu_staging_dir['path'] }}/helm/linux-amd64/helm"
    state: present
